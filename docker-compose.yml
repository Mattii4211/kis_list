services:
  app:
    build: .
    user: root
    ports:
      - "8000:80"
    environment:
      APP_ENV: dev
      DATABASE_URL: "pgsql://postgres:postgres@db:5432/library?serverVersion=16&charset=utf8"
    depends_on:
      - db
    volumes:
      - .:/var/www/html

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: library
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
